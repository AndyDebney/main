version: 2

models:
  - name: fct_orders
    description: Business-friendly orders fact table with one row per order and customer details.
    columns:
      - name: order_id
        description: Primary key for each order.
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Identifier for the customer who placed the order.
        data_tests:
          - not_null

      - name: customer_name
        description: Name of the customer who placed the order.

      - name: ordered_at
        description: Timestamp when the order was placed.
        data_tests:
          - not_null

      - name: order_date
        description: Calendar date when the order was placed.

      - name: store_id
        description: Identifier for the store where the order was placed.
        data_tests:
          - not_null

      - name: subtotal_amount
        description: Order subtotal before tax.

      - name: tax_amount
        description: Tax amount charged on the order.

      - name: total_amount
        description: Final order total including tax.
